name: Update data.json

on:
  schedule:
    - cron: '0 * * * *'      # elk uur (UTC); GitHub kan enkele minuten later starten
  workflow_dispatch: {}        # handmatig startbaar via de Actions-tab
  push:
    branches: [ main ]         # ook bij elke push naar main

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Genereer data.json uit Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
        run: node build-data.js

      - name: Commit & push als er iets gewijzigd is
        run: |
          git config user.name  "kdg-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Geen wijzigingen in data.json."
          else
            git commit -m "Update data.json ($(date -u +%FT%TZ))"
            git push
          fi
