<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KdG · Persoonlijk contact over je studiekeuze</title>
<style>
  /* Widget erft lettertype, kleur en groottes van de KdG-site. Enkel layout + kleuraccenten. Tekst altijd zwart. */
  :root{
    --zwart:#000; --wit:#fff;
    --grijs-licht:#e6e6e6; --grijs-bg:#f3f3f1; --grijs-hover:#e8e8e4; --grijs-donker:#444;
    --paneel:#8cc8d2; --mint:#8cdcb9;
  }
  .kdg-app *{box-sizing:border-box}
  .kdg-app{ font:inherit; color:inherit; background:var(--wit); width:100%; max-width:none; margin:0; padding:4px 0 16px; }
  .kdg-app p{margin:0}

  .paneel{background:var(--paneel); padding:30px 32px; margin:0 0 18px}
  .kop{margin:0 0 18px}

  .zoekbox input{width:100%; font:inherit; padding:15px 16px; border:2px solid var(--zwart); background:var(--wit); outline:none}
  .zoekbox input:focus{box-shadow:0 0 0 3px var(--zwart)}
  .filters{display:flex; flex-wrap:wrap; gap:10px; margin:16px 0 6px}
  .chip{font:inherit; padding:8px 14px; border:0; background:var(--wit); cursor:pointer; line-height:1.2}
  .chip[aria-pressed="true"]{background:var(--zwart); color:var(--wit)}
  .telling{margin:14px 2px 0}

  .lijst{list-style:none; margin:0; padding:0; display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .lijst li{margin:0; display:flex}
  .opl-knop{width:100%; text-align:left; font:inherit; background:var(--grijs-bg); border:0;
    padding:18px 20px; cursor:pointer; display:flex; flex-direction:column; justify-content:center; gap:10px}
  .opl-knop:hover,.opl-knop:focus{background:var(--grijs-hover); outline:none}
  .opl-nm{font-weight:800; font-size:1.18em}
  .opl-tags{display:flex; flex-wrap:wrap; gap:8px}
  .tag{font-size:.82em; padding:4px 10px; white-space:nowrap}
  .leeg{grid-column:1/-1; padding:20px; color:var(--grijs-donker); background:var(--grijs-bg)}

  .gekozen{display:none}
  .gekozen.actief{display:block}
  .terug{font:inherit; background:none; border:0; cursor:pointer; padding:6px 0; margin:0 0 18px; text-decoration:underline}
  .opl-head{background:var(--paneel); padding:26px 30px; margin:0 0 26px}
  .opl-head h2{margin:0 0 12px}
  .badges{display:flex; flex-wrap:wrap; gap:8px}

  .kaarten{display:grid; grid-template-columns:1fr 1fr; gap:22px}
  .kaart{background:var(--grijs-bg); padding:28px; display:grid; grid-template-columns:36px 1fr; gap:18px; align-items:start}
  .kaart .ico svg{width:32px; height:32px; display:block}
  .kaart h3{margin:0 0 8px; font-size:1.55em; line-height:1.15}
  .kaart .desc{color:var(--grijs-donker); margin:0 0 14px}
  .kaart .detail{margin:0 0 20px}
  .knoppen{display:flex; flex-wrap:wrap; gap:12px}
  .cta{display:inline-flex; align-items:center; gap:9px; font:inherit; font-weight:700;
    background:var(--zwart); color:var(--wit); border:2px solid var(--zwart); padding:12px 20px; cursor:pointer; text-decoration:none}
  .cta:hover{background:var(--wit); color:var(--zwart)}
  .cta:active{background:var(--grijs-bg); color:var(--zwart)}
  .cta.sec{background:var(--wit); color:var(--zwart)}
  .cta.sec:hover{background:var(--zwart); color:var(--wit)}
  .cta svg{width:16px;height:16px}
  .geen-acties{color:var(--grijs-donker)}
  .status{color:var(--grijs-donker); padding:8px 2px}

  /* Demo-balk: enkel zichtbaar met ?preview=1 in de URL */
  .demobar{display:none; flex-wrap:wrap; gap:12px 18px; align-items:center; justify-content:space-between;
    background:var(--grijs-bg); border:1px dashed #bbb; padding:14px 18px; margin:0 0 26px; font-size:.9em}
  .demobar.toon{display:flex}
  .switch{display:inline-flex; align-items:center; gap:9px; cursor:pointer; font-weight:500}
  .switch input{appearance:none; width:40px; height:22px; background:#bbb; border-radius:999px; position:relative; cursor:pointer; transition:.15s; flex:0 0 auto}
  .switch input:checked{background:var(--zwart)}
  .switch input::after{content:""; position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:var(--wit); transition:.15s}
  .switch input:checked::after{left:20px}

  @media(max-width:640px){
    .paneel{padding:22px 20px}
    .opl-head{padding:22px 20px}
    .lijst{grid-template-columns:1fr}
    .kaarten{grid-template-columns:1fr}
    .kaart{grid-template-columns:1fr; padding:22px}
    .kaart .ico{display:none}
  }
</style>
</head>

<div class="kdg-app">

  <div class="demobar" id="demobar">
    <span>👀 <b>Voorbeeldweergave (preview).</b> Aan = alle opleidingen tonen illustratieve acties.</span>
    <label class="switch"><input type="checkbox" id="demoToggle"><span>Voorbeelddata tonen</span></label>
  </div>

  <div id="stap1">
    <div class="paneel">

      <div class="zoekbox">

      </div>
      <div class="filters" id="typeFilters" aria-label="Filter op opleidingstype"></div>
      <p class="telling" id="telling"></p>
    </div>
    <ul class="lijst" id="lijst"><li class="status">Bezig met laden…</li></ul>
  </div>

  <div class="gekozen" id="stap2">
    <button class="terug" id="terug">← Andere opleiding kiezen</button>
    <div class="opl-head">
      <h2 id="oplNaam"></h2>
      <div class="badges" id="oplBadges"></div>
    </div>
    <div class="kaarten" id="kaarten"></div>
  </div>

</div>

    online:'<rect x="3" y="6.5" width="12" height="11" rx="2"/><path d="M15 10.5l5.4-2.7a.6.6 0 01.9.5v7.4a.6.6 0 01-.9.5L15 13.5"/>',
    fysiek:'<path d="M12 21c4.2-4.4 6.3-7.6 6.3-10.6a6.3 6.3 0 10-12.6 0C5.7 13.4 7.8 16.6 12 21z"/><circle cx="12" cy="10.4" r="2.3"/>',
    info:'<circle cx="12" cy="12" r="8.5"/><path d="M12 11v5.5"/><path d="M12 7.6h.01"/>',
    groep:'<circle cx="9" cy="8.4" r="3.1"/><path d="M3.4 19c0-3.1 2.5-5.4 5.6-5.4s5.6 2.3 5.6 5.4"/><path d="M16.2 6.2a3.1 3.1 0 010 6.1"/><path d="M17.4 14a4.6 4.6 0 013.2 4.6"/>'
  };
  const arrow = '<svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  function icoon(naam){ return `<svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">${ICONS[naam]}</svg>`; }

  function mailto(email, opl, wat){ return `mailto:${email}?subject=${encodeURIComponent(wat+' '+opl)}`; }
  function naamEnMail(naam, email, wie){ const p=[]; if(naam) p.push(`${wie} <b>${esc(naam)}</b>`); if(email) p.push(esc(email)); return p.join(' · '); }
  function tag(label, kleur){ return `<span class="tag" style="background:${kleur||'#cdd2d2'}">${esc(label)}</span>`; }

  const ACTIES = [
    { key:'infoFysiek', icon:'groep', titel:'Infomoment op de campus',
      desc:'Kom langs voor een georganiseerd infomoment over de opleiding.',
      heeft:r=>r.ifDatum,
      detail:r=>`<b>${fmtDatum(r.ifDatum)}</b>${r.ifDuur?` · Duur ${esc(r.ifDuur)}`:''}${r.ifCampus?`<br>${esc(r.ifCampus)}`:''}${r.ifOnthaal?` — onthaal: ${esc(r.ifOnthaal)}`:''}`,
      knoppen:r=>[{label:'Schrijf je in', href:r.ifUrl||'https://www.kdg.be/infodagen'}] },
    { key:'infoOnline', icon:'info', titel:'Online infosessie',
      desc:'Schrijf je in via het formulier. Je ontvangt nadien de Teams-link per mail.',
      heeft:r=>r.ioUrl,
      detail:r=>`<b>${fmtDatum(r.ioDatum)}</b>${r.ioDuur?` · Duur ${esc(r.ioDuur)}`:''}`,
      knoppen:r=>[{label:'Schrijf je in', href:r.ioUrl}] },
    { key:'fysiek1', icon:'fysiek', titel:'1-op-1 afspraak op de campus',
      desc:'Plan een persoonlijk gesprek op de campus met een informant.',
      heeft:r=>r.fysiekUrl||r.fysiekEmail,
      detail:r=> naamEnMail(r.fysiekNaam, r.fysiekEmail, 'Je spreekt met'),
      knoppen:r=>{ const k=[]; if(r.fysiekUrl) k.push({label:'Plan online een afspraak', href:r.fysiekUrl});
        if(r.fysiekEmail) k.push({label:'Plan via e-mail', sec:true, href:mailto(r.fysiekEmail,r.__opl,'Afspraak op de campus –')}); return k; } },
    { key:'online1', icon:'online', titel:'1-op-1 afspraak online',
      desc:'Plan een persoonlijk videogesprek met een informant.',
      heeft:r=>r.onlineUrl||r.onlineEmail,
      detail:r=> naamEnMail(r.onlineNaam, r.onlineEmail, 'Je spreekt met'),
      knoppen:r=>{ const k=[]; if(r.onlineUrl) k.push({label:'Plan online een afspraak', href:r.onlineUrl});
        if(r.onlineEmail) k.push({label:'Plan via e-mail', sec:true, href:mailto(r.onlineEmail,r.__opl,'Online afspraak –')}); return k; } },
    { key:'chat', icon:'chat', titel:'Chat met de opleiding',
      desc:'Een kort, vrijblijvend chatgesprek via Unibuddy.',
      heeft:r=>r.chatUrl,
      detail:r=> r.chatNaam ? `Je chat met <b>${esc(r.chatNaam)}</b>.` : '',
      knoppen:r=>[{label:'Start de chat', href:r.chatUrl, sameWindow:true}] },
    { key:'mail', icon:'mail', titel:'Mail met een docent',
      desc:'Stel je vraag schriftelijk aan de contactpersoon van de opleiding.',
      heeft:r=>r.mailEmail,
      detail:r=> naamEnMail(r.mailNaam, r.mailEmail, 'Je mailt met'),
      knoppen:r=>[{label:'Stuur een mail', sec:true, href:mailto(r.mailEmail,r.__opl,'Vraag over de opleiding')}] }
  ];

  function hash(s){ let h=0; for(let i=0;i<s.length;i++) h=(h*31+s.charCodeAt(i))>>>0; return h; }
  function demoRecord(opl){
    const h=hash(opl.naam), r={__opl:opl.naam};
    r.mailNaam='de opleidingscontactpersoon'; r.mailEmail='opleiding@kdg.be';
    r.chatNaam='een student of docent'; r.chatUrl=CHAT_URL;
    if(h%2===0){ r.onlineNaam='een informant'; r.onlineUrl='https://www.kdg.be'; r.onlineEmail='informant@kdg.be'; }
    if(h%3!==0){ r.fysiekNaam='een informant'; r.fysiekUrl='https://www.kdg.be'; r.fysiekEmail='informant@kdg.be'; }
    if(h%2===1){ r.ioDatum='2026-07-02T16:00:00.000Z'; r.ioDuur='45 min'; r.ioUrl='https://www.kdg.be'; }
    if(h%4!==0){ r.ifDatum='2026-07-05T12:30:00.000Z'; r.ifDuur='1u30'; r.ifCampus=opl.campus||'Campus'; r.ifOnthaal='Onthaalbalie'; r.ifUrl='https://www.kdg.be'; }
    return r;
  }
  function recordVoor(opl){ return ACTIES_DATA[opl.naam] || (demo? demoRecord(opl): null); }
  function heeftActies(opl){ const r=recordVoor(opl); return !!r && ACTIES.some(a=>a.heeft(r)); }

  function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
  function fmtDatum(s){ if(!s) return ''; const d=new Date(s); if(isNaN(d)) return esc(s);
    try{
      const p=Object.fromEntries(new Intl.DateTimeFormat('nl-BE',{weekday:'long',day:'numeric',month:'long',hour:'2-digit',minute:'2-digit',hour12:false,timeZone:'Europe/Brussels'}).formatToParts(d).map(x=>[x.type,x.value]));
      return `${p.weekday} ${p.day} ${p.month}, ${p.hour}.${p.minute} u.`;
    }catch(e){ return esc(s); }
  }

  const $=id=>document.getElementById(id);
  const lijst=$('lijst'), zoek=$('zoek'), telling=$('telling'), typeFilters=$('typeFilters');
  let typeActief='', demo=false, huidige=null;

  // preview-modus via ?preview=1
  if(/[?&]preview=1/.test(location.search)){ $('demobar').classList.add('toon'); }
  $('demoToggle').addEventListener('change',e=>{ demo=e.target.checked; render(); if(huidige) toonActies(huidige); });

  function bouwFilters(){
    const TYPES=[...new Set(OPLEIDINGEN.map(o=>o.type).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'nl'));
    typeFilters.innerHTML = `<button class="chip" data-t="" aria-pressed="true">Alle opleidingen</button>` +
      TYPES.map(t=>`<button class="chip" data-t="${esc(t)}" aria-pressed="false">${esc(t)}</button>`).join('');
  }
  typeFilters.addEventListener('click',e=>{ const b=e.target.closest('.chip'); if(!b) return;
    typeActief=b.dataset.t; [...typeFilters.children].forEach(ch=>ch.setAttribute('aria-pressed', ch===b)); render(); });

  function render(){
    const q=zoek.value.trim().toLowerCase();
    const res=OPLEIDINGEN.filter(o=>heeftActies(o)&&(!typeActief||o.type===typeActief)&&(!q||o.naam.toLowerCase().includes(q)));
    telling.textContent=`${res.length} opleiding${res.length===1?'':'en'}`;
    if(!res.length){ lijst.innerHTML='<li class="leeg">Geen opleiding gevonden. Probeer een andere zoekterm.</li>'; return; }
    lijst.innerHTML=res.map(o=>`<li><button class="opl-knop" data-i="${OPLEIDINGEN.indexOf(o)}">
      <span class="opl-nm">${esc(o.naam)}</span>
      <span class="opl-tags">${tag(o.type, TYPE_KLEUR[o.type])}${o.campus?tag(o.campus.replace('Campus ',''), CAMPUS_KLEUR[o.campus]):''}</span>
    </button></li>`).join('');
  }
  zoek.addEventListener('input',render);
  lijst.addEventListener('click',e=>{ const b=e.target.closest('.opl-knop'); if(b) kies(OPLEIDINGEN[+b.dataset.i]); });

  function kies(opl){
    huidige=opl;
    $('stap1').style.display='none';
    $('oplNaam').textContent=opl.naam;
    $('oplBadges').innerHTML=tag(opl.type,'#fff')+(opl.campus?tag(opl.campus,'#fff'):'');
    toonActies(opl);
    $('stap2').classList.add('actief');
    window.scrollTo({top:0,behavior:'smooth'});
  }
  $('terug').addEventListener('click',()=>{ $('stap2').classList.remove('actief'); $('stap1').style.display=''; huidige=null; });

  function renderBtn(c){
    const ext=/^https?:/.test(c.href);
    const target=(ext && !c.sameWindow) ? 'target="_blank" rel="noopener"' : '';
    return `<a class="cta ${c.sec?'sec':''}" href="${c.href}" ${target}>${c.label} ${arrow}</a>`;
  }
  function toonActies(opl){
    const rec = recordVoor(opl) || {__opl:opl.naam}; rec.__opl=opl.naam;
    const kaarten = ACTIES.filter(a=>a.heeft(rec)).map(a=>{
      const det=a.detail(rec); const knoppen=a.knoppen(rec).map(renderBtn).join('');
      return `<div class="kaart"><div class="ico">${icoon(a.icon)}</div><div>
        <h3>${a.titel}</h3><p class="desc">${a.desc}</p>
        ${det?`<p class="detail">${det}</p>`:''}<div class="knoppen">${knoppen}</div></div></div>`;
    }).join('');
    $('kaarten').innerHTML = kaarten || '<p class="geen-acties">Voor deze opleiding zijn er momenteel geen extra acties ingepland.</p>';
  }

  // === Data laden ===
  function toepassen(data){
    OPLEIDINGEN = (data && data.opleidingen) || [];
    ACTIES_DATA = (data && data.acties) || {};
    bouwFilters(); render();
  }
  fetch(DATA_URL, {cache:'no-store'})
    .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
    .then(toepassen)
    .catch(()=>{ toepassen(DATA_FALLBACK); });

  // === Auto-hoogte voor iframe-embed ===
  function postHeight(){ try{ parent.postMessage({kdgHeight: document.documentElement.scrollHeight}, '*'); }catch(e){} }
  if(window.ResizeObserver){ new ResizeObserver(postHeight).observe(document.body); }
  window.addEventListener('load', postHeight);
})();
</script>
</body>
</html>
